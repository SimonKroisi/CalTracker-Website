<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waitlist – CalTracker</title>
  <meta name="description" content="Join the CalTracker waitlist and be the first to know when new features launch.">
  <link rel="icon" type="image/png" href="/caltracker_icon.png">
  <link rel="apple-touch-icon" href="/caltracker_icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #4CAF50; --green-dark: #388E3C; --green-light: #81C784;
      --green-glow: rgba(76, 175, 80, 0.4); --orange: #FF9800;
      --bg: #0f172a; --bg-secondary: #1e293b;
      --text: #f1f5f9; --text-secondary: #94a3b8;
      --card-bg: #1e293b; --card-border: #334155;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes floatReverse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    .bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; }
    .bg-shape-1 { width: 500px; height: 500px; background: rgba(76, 175, 80, 0.3); top: -200px; right: -100px; animation: float 20s ease-in-out infinite; }
    .bg-shape-2 { width: 400px; height: 400px; background: rgba(255, 152, 0, 0.2); bottom: -100px; left: -100px; animation: floatReverse 15s ease-in-out infinite; }

    .container {
      position: relative; z-index: 1;
      max-width: 600px; margin: 0 auto; padding: 60px 24px;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .logo img { width: 56px; height: 56px; border-radius: 14px; }
    .logo span { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--green), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.2;
      margin-bottom: 20px;
    }

    h1 .highlight {
      background: linear-gradient(135deg, var(--green), var(--orange));
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradient-shift 5s ease infinite;
    }

    .subtitle {
      font-size: 1.15rem; color: var(--text-secondary);
      line-height: 1.7; margin-bottom: 40px; max-width: 480px;
    }

    .waitlist-form {
      display: flex; gap: 12px; width: 100%; max-width: 460px; margin-bottom: 30px;
    }

    .waitlist-form input {
      flex: 1; padding: 16px 20px; border-radius: 14px;
      border: 2px solid var(--card-border); background: var(--card-bg);
      color: var(--text); font-size: 1rem; font-family: inherit;
      transition: border-color 0.3s; outline: none;
    }

    .waitlist-form input:focus { border-color: var(--green); }

    .waitlist-form input::placeholder { color: var(--text-secondary); }

    .waitlist-form button {
      padding: 16px 28px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s; font-family: inherit;
      box-shadow: 0 8px 25px var(--green-glow);
      white-space: nowrap;
    }

    .waitlist-form button:hover { transform: translateY(-2px); box-shadow: 0 12px 35px var(--green-glow); }

    .success-message {
      display: none; padding: 16px 24px; border-radius: 14px;
      background: rgba(76, 175, 80, 0.15); border: 1px solid rgba(76, 175, 80, 0.3);
      color: var(--green); font-weight: 600; margin-bottom: 30px;
    }

    .explore-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 14px;
      background: var(--card-bg); border: 2px solid var(--card-border);
      color: var(--text); text-decoration: none; font-weight: 600;
      transition: all 0.3s;
    }

    .explore-btn:hover { border-color: var(--green); color: var(--green); transform: translateY(-2px); }
    .explore-btn svg { width: 20px; height: 20px; }

    .footer-text {
      margin-top: auto; padding-top: 40px;
      color: var(--text-secondary); font-size: 0.85rem;
    }
    .footer-text a { color: var(--green); text-decoration: none; }

    @media (max-width: 480px) {
      .waitlist-form { flex-direction: column; }
      .waitlist-form button { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="bg-shapes">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
  </div>

  <div class="container">
    <div class="logo">
      <img src="/caltracker_icon.png" alt="CalTracker">
      <span>CalTracker</span>
    </div>

    <h1>Something <span class="highlight">amazing</span> is coming.</h1>
    <p class="subtitle">Be the first to know when new CalTracker features launch. Join our waitlist and get early access.</p>

    <form class="waitlist-form" onsubmit="handleWaitlist(event)">
      <input type="email" placeholder="Enter your email" required autocomplete="email">
      <button type="submit">Join Waitlist</button>
    </form>

    <div class="success-message" id="successMsg">
      🎉 You're on the list! We'll let you know when it's ready.
    </div>

    <a href="/" class="explore-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Explore CalTracker
    </a>

    <div class="footer-text">
      <p>&copy; 2026 CalTracker &middot; <a href="/privacy-policy.html">Privacy</a> &middot; <a href="/terms-of-service.html">Terms</a></p>
    </div>
  </div>

  <script>
    function handleWaitlist(e) {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('successMsg');
      form.style.display = 'none';
      msg.style.display = 'block';
    }
  </script>

</body>
</html>
